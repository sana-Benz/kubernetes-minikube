apiVersion: apps/v1
kind: Deployment
metadata:
  name: myservice2
spec:
  replicas: 3
  selector:
    matchLabels:
      app: myservice2
  template:
    metadata:
      labels:
        app: myservice2
    spec:
      containers:
        - image: sanabns/myservice:v2
          imagePullPolicy: IfNotPresent
          name: myservice2
          ports:
            - containerPort: 8080
      restartPolicy: Always
